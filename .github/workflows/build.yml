name: CI & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Get Maven Version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          CLEAN_VERSION=${VERSION/-SNAPSHOT/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          FINAL_VERSION="${CLEAN_VERSION}-${SHORT_SHA}"
          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xconomy-jars
          path: |
            XConomy-Bukkit/target/*.jar
            XConomy-Sponge7/target/*.jar
            XConomy-Sponge8/target/*.jar
            XConomy-Paper/target/*.jar
            XConomy-Core/target/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: xconomy-jars
          path: ./jars

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.project_version }}
          name: Release v${{ needs.build.outputs.project_version }}
          files: ./jars/**/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
